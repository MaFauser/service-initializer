# Chart defaults: structure, ports, services, persistence.
# Always combine with: -f config/images.yaml -f <env>.yaml (local.yaml | dev.yaml | prod.yaml)

global:
  storageClass: ""

ingress:
  className: ""
  annotations: {}
  hosts:
    - host: app.example.com
      path: /
      pathType: Prefix
  tls: []

postgresql:
  image:
    pullPolicy: IfNotPresent
  auth:
    username: ""
    password: ""
    existingSecret: ""
    usernameKey: ""
    passwordKey: ""
  service:
    type: ClusterIP
    port: 5432
  backup:
    schedule: "0 2 * * *"
    pvc:
      size: 10Gi

redis:
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true

kafka:
  image:
    pullPolicy: IfNotPresent
  config:
    nodeId: 1
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    replicationFactor: 1
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true

kafkaUi:
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  image:
    pullPolicy: IfNotPresent
  auth:
    adminUser: ""
    adminPassword: ""
    existingSecret: ""
    adminUserKey: ""
    adminPasswordKey: ""
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true

tempo:
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      http: 3200
      otlpGrpc: 4317
      otlpHttp: 4318
  persistence:
    enabled: true

opensearch:
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  persistence:
    enabled: true
  auth:
    existingSecret: ""
    adminPasswordKey: ""
    adminPassword: ""

opensearchDashboards:
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5601

fluentBit:
  image:
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

prometheus:
  image:
    pullPolicy: IfNotPresent
  scrapeInterval: 15s
  evaluationInterval: 15s
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true

application:
  image:
    repository: your-registry/service
    tag: "latest"
    pullPolicy: IfNotPresent
  managementPort: 8082
  service:
    type: ClusterIP
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
