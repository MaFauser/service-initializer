{{- if and .Values.opensearch.enabled .Values.opensearchDashboards.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "stack.fullname" . }}-opensearch-dashboards-provision
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opensearch-dashboards-provision
    spec:
      restartPolicy: OnFailure
      containers:
      - name: provision
        image: docker.io/curlimages/curl:8.10.1
        command:
        - /bin/sh
        - -c
        - |
          DASHBOARDS="{{ include "stack.fullname" . }}-opensearch-dashboards"
          echo "Waiting for OpenSearch Dashboards..."
          for i in $(seq 1 30); do
            if curl -sf "http://${DASHBOARDS}:5601/api/status" > /dev/null 2>&1; then
              echo "OpenSearch Dashboards is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Timeout waiting for OpenSearch Dashboards"
              exit 1
            fi
            echo "Attempt $i/30: not ready, retrying in 10s..."
            sleep 10
          done
          echo "Creating index pattern {{ .Values.opensearchDashboards.indexPattern }}..."
          HTTP=$(curl -sf -w "%{http_code}" -o /tmp/response -X POST \
            "http://${DASHBOARDS}:5601/api/saved_objects/index-pattern/kubernetes-logs" \
            -H "osd-xsrf: true" \
            -H "Content-Type: application/json" \
            -d '{"attributes":{"title":"{{ .Values.opensearchDashboards.indexPattern }}","timeFieldName":"@timestamp"}}')
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "Index pattern created successfully"
          elif [ "$HTTP" = "409" ]; then
            echo "Index pattern already exists"
          else
            echo "Failed to create index pattern (HTTP $HTTP)"
            cat /tmp/response
            exit 1
          fi
{{- end }}
