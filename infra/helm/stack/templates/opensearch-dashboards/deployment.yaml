{{- if and .Values.opensearch.enabled .Values.opensearchDashboards.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stack.fullname" . }}-opensearch-dashboards
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: opensearch-dashboards
  template:
    metadata:
      labels:
        {{- include "stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: opensearch-dashboards
    spec:
      containers:
      - name: opensearch-dashboards
        image: "{{ .Values.opensearchDashboards.image.repository }}:{{ .Values.opensearchDashboards.image.tag }}"
        imagePullPolicy: {{ .Values.opensearchDashboards.image.pullPolicy }}
        env:
        {{- if .Values.opensearch.disableSecurity }}
        - name: OPENSEARCH_HOSTS
          value: '["http://{{ include "stack.fullname" . }}-opensearch:9200"]'
        - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
          value: "true"
        {{- else }}
        - name: OPENSEARCH_HOSTS
          value: '["https://{{ include "stack.fullname" . }}-opensearch:9200"]'
        - name: OPENSEARCH_USERNAME
          value: admin
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "stack.fullname" . }}-opensearch
              key: admin-password
        {{- end }}
        ports:
        - name: http
          containerPort: 5601
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/status
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/status
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          {{- toYaml .Values.opensearchDashboards.resources | nindent 10 }}
{{- end }}
