{{- if .Values.opensearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stack.fullname" . }}-opensearch
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
spec:
  type: {{ .Values.opensearch.service.type }}
  ports:
  - port: {{ .Values.opensearch.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: 9600
    targetPort: performance
    protocol: TCP
    name: performance
  selector:
    {{- include "stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
{{- end }}
