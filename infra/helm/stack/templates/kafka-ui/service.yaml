{{- if .Values.kafkaUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stack.fullname" . }}-kafka-ui
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-ui
spec:
  type: {{ .Values.kafkaUi.service.type }}
  ports:
  - port: {{ .Values.kafkaUi.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-ui
{{- end }}
