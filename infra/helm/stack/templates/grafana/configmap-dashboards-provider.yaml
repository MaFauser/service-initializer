{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-grafana-dashboards-provider
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: default
        orgId: 1
        folder: Service
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
{{- end }}
