{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-grafana-dashboards
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | nindent 4 }}
{{- end }}
{{- end }}
