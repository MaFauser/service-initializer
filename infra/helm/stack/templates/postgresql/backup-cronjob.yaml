{{- if and .Values.postgresql.enabled .Values.postgresql.backup .Values.postgresql.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "stack.fullname" . }}-postgresql-backup
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql-backup
spec:
  schedule: {{ .Values.postgresql.backup.schedule }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "stack.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: postgresql-backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: {{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}
            imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
            command:
            - /bin/sh
            - -c
            - |
              set -e
              F="/backup/backup-$(date +%Y%m%d-%H%M%S).sql"
              pg_dump -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -F p -f "$F"
              gzip -f "$F"
              echo "Backup written to ${F}.gz"
              # Keep only last 7 days
              find /backup -name 'backup-*.sql.gz' -mtime +7 -delete
            env:
            - name: PGHOST
              value: {{ include "stack.fullname" . }}-postgresql
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: {{ .Values.postgresql.auth.database }}
            {{- if .Values.postgresql.auth.existingSecret }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.usernameKey }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.passwordKey }}
            {{- else }}
            - name: PGUSER
              value: {{ .Values.postgresql.auth.username }}
            - name: PGPASSWORD
              value: {{ .Values.postgresql.auth.password }}
            {{- end }}
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: {{ include "stack.fullname" . }}-postgresql-backup
{{- end }}
