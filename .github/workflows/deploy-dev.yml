name: Deploy to Dev

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: "v3.14.2"

jobs:
  deploy-dev:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (lowercase for OCI spec)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run tests
        run: ./gradlew test --warning-mode=none

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Tag and push images
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest

      - name: Deploy to Dev Cluster
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DEV }}
          kubeconfig-encoding: base64

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Ensure namespace exists
        run: |
          kubectl create namespace development --dry-run=client -o yaml | kubectl apply -f -

      # Image pull secret (ghcr-registry) and app/Postgres/Grafana credentials must already exist
      # in the cluster (e.g. from External Secrets / key manager). The workflow does not inject passwords.

      - name: Deploy with Helm
        run: |
          helm upgrade --install dev ./helm/stack \
            -f ./helm/stack/config/shared.yaml \
            -f ./helm/stack/values.yaml \
            -f ./helm/stack/values-dev.yaml \
            --set application.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set application.image.tag=dev-${{ github.sha }} \
            --namespace development \
            --create-namespace

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployed to Dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** dev" >> $GITHUB_STEP_SUMMARY
