name: Deploy to Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    name: Resolve Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      src_tag: ${{ steps.resolve.outputs.src_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: resolve
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          SRC_TAG="src-${{ hashFiles('src/**', 'build.gradle.kts') }}"
          echo "src_tag=${SRC_TAG}" >> $GITHUB_OUTPUT
          if docker manifest inspect "${IMAGE}:${SRC_TAG}" > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.resolve.outputs.found != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Build and push image
        if: steps.resolve.outputs.found != 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          ./gradlew bootBuildImage --imageName="${IMAGE}:${{ steps.resolve.outputs.src_tag }}" -x test
          docker push "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

      - name: Tag as dev-latest
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          docker buildx imagetools create -t "${IMAGE}:dev-latest" "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

  deploy:
    name: Deploy
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DEV }}
          kubeconfig-encoding: base64

      - uses: azure/setup-helm@v3
        with:
          version: v3.14.2

      - name: Deploy
        run: |
          IMAGE_REPO="${REGISTRY}/${IMAGE_NAME,,}"
          helm upgrade --install dev ./helm/stack \
            -f ./helm/stack/config/images.yaml \
            -f ./helm/stack/dev.yaml \
            --set application.image.repository="${IMAGE_REPO}" \
            --set application.image.tag=${{ needs.image.outputs.src_tag }} \
            --namespace development \
            --create-namespace
