name: Deploy to Dev

on:
  push:
    branches:
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: "v3.14.2"

jobs:
  deploy-dev:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (lowercase for OCI spec)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run tests
        run: ./gradlew test --warning-mode=none

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

      - name: Tag and push images
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest

      - name: Deploy to Dev Cluster
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DEV }}
          kubeconfig-encoding: base64

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Clear stuck Helm release
        run: |
          STATUS=$(helm list -n development -a -o json 2>/dev/null | jq -r '.[] | select(.name=="dev") | .status' 2>/dev/null || echo "")
          if [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Clearing stuck release (status=$STATUS)..."
            REV=$(helm list -n development -a -o json | jq -r '.[] | select(.name=="dev") | .revision')
            kubectl delete secret "sh.helm.release.v1.dev.v${REV}" -n development --ignore-not-found
            echo "Cleared."
          fi

      - name: Deploy with Helm
        run: |
          for i in 1 2 3; do
            echo "Helm deploy attempt $i/3..."
            if helm upgrade --install dev ./helm/stack \
              -f ./helm/stack/values-dev.yaml \
              --set application.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set application.image.tag=dev-${{ github.sha }} \
              --namespace development \
              --create-namespace \
              --timeout 5m \
            && kubectl wait --for=condition=available deployment/dev-stack-app -n development --timeout=5m; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Deploy failed, retrying in 60s (often due to API rate limiting)..."
              sleep 60
            fi
          done
          exit 1

      - name: Deployment diagnostics
        if: failure()
        run: |
          echo "=== Pods in development ==="
          kubectl get pods -n development -o wide 2>/dev/null || true
          echo ""
          echo "=== App pod details (dev-stack-app) ==="
          APP_POD=$(kubectl get pods -n development -l app.kubernetes.io/component=app -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$APP_POD" ]; then
            kubectl describe pod -n development "$APP_POD" 2>/dev/null || true
            echo ""
            echo "=== App container logs ==="
            kubectl logs -n development "$APP_POD" -c app --tail=100 2>/dev/null || true
          fi
          echo ""
          echo "=== Recent events ==="
          kubectl get events -n development --sort-by='.lastTimestamp' 2>/dev/null | tail -40 || true

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployed to Dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** dev" >> $GITHUB_STEP_SUMMARY
