name: Push & Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      src_tag: ${{ steps.resolve.outputs.src_tag }}
      image_repo: ${{ steps.names.outputs.image_repo }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: names
        run: |
          IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "image_repo=${REGISTRY}/${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: resolve
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SRC_TAG="src-${{ hashFiles('src/**', 'build.gradle.kts', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}"
          echo "src_tag=${SRC_TAG}" >> $GITHUB_OUTPUT
          if docker manifest inspect "${IMAGE}:${SRC_TAG}" > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.resolve.outputs.found != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        if: steps.resolve.outputs.found != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        if: steps.resolve.outputs.found != 'true'
        run: ./gradlew build jacocoTestCoverageVerification --warning-mode=none --build-cache

      - name: Build and push image
        if: steps.resolve.outputs.found != 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          ./gradlew bootBuildImage --imageName="${IMAGE}:${{ steps.resolve.outputs.src_tag }}" -x test --build-cache
          docker push "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

      - name: Tag as dev-latest
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create -t "${IMAGE}:dev-latest" "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

  deploy:
    name: Deploy to Dev
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DEV }}
          kubeconfig-encoding: base64

      - name: Bootstrap deployment if missing
        run: |
          if kubectl get deployment/dev-stack-app --namespace development >/dev/null 2>&1; then
            echo "dev-stack-app already exists, skipping bootstrap"
            exit 0
          fi

          echo "Bootstrapping dev-stack-app deployment and service"
          kubectl apply --namespace development -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: dev-stack-app
            labels:
              app.kubernetes.io/component: app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/component: app
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: app
              spec:
                imagePullSecrets:
                  - name: ghcr-registry
                containers:
                  - name: app
                    image: ${{ needs.image.outputs.image_repo }}:${{ needs.image.outputs.src_tag }}
                    ports:
                      - name: http
                        containerPort: 8081
                      - name: management
                        containerPort: 8082
                    env:
                      - name: SPRING_PROFILES_ACTIVE
                        value: k8s
                      - name: POSTGRES_URL
                        value: jdbc:postgresql://dev-stack-postgresql:5432/servicedb
                      - name: POSTGRES_USER
                        valueFrom:
                          secretKeyRef:
                            name: dev-stack-postgresql-credentials
                            key: username
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: dev-stack-postgresql-credentials
                            key: password
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: dev-stack-app
          spec:
            selector:
              app.kubernetes.io/component: app
            ports:
              - name: http
                port: 8081
                targetPort: http
              - name: management
                port: 8082
                targetPort: management
          EOF

      - name: Deploy new image
        run: |
          kubectl set image deployment/dev-stack-app \
            app="${{ needs.image.outputs.image_repo }}:${{ needs.image.outputs.src_tag }}" \
            --namespace development

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/dev-stack-app --namespace development --timeout=120s
          echo "Deployment rolled out successfully"
