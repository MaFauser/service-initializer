name: Push & Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      src_tag: ${{ steps.resolve.outputs.src_tag }}
      image_repo: ${{ steps.names.outputs.image_repo }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: names
        run: |
          IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "image_repo=${REGISTRY}/${IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: resolve
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SRC_TAG="src-${{ hashFiles('src/**', 'build.gradle.kts', 'settings.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}"
          echo "src_tag=${SRC_TAG}" >> $GITHUB_OUTPUT
          if docker manifest inspect "${IMAGE}:${SRC_TAG}" > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.resolve.outputs.found != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        if: steps.resolve.outputs.found != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        if: steps.resolve.outputs.found != 'true'
        run: ./gradlew build jacocoTestCoverageVerification --warning-mode=none --build-cache

      - name: Build and push image
        if: steps.resolve.outputs.found != 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          ./gradlew bootBuildImage --imageName="${IMAGE}:${{ steps.resolve.outputs.src_tag }}" -x test --build-cache
          docker push "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

      - name: Tag as dev-latest
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create -t "${IMAGE}:dev-latest" "${IMAGE}:${{ steps.resolve.outputs.src_tag }}"

  deploy:
    name: Trigger Deploy
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy to platform-infra
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PLATFORM_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/MaFauser/platform-infra/dispatches \
            -d '{"event_type":"deploy-dev","client_payload":{"service_name":"${{ github.event.repository.name }}","image_repo":"${{ needs.image.outputs.image_repo }}","image_tag":"${{ needs.image.outputs.src_tag }}","namespace":"development"}}'

