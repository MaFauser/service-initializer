name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test

      - name: Build Docker image (validation only)
        run: |
          ./gradlew bootBuildImage \
            --imageName=service:pr-${{ github.event.pull_request.number }}

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build successful!** All tests passed and Docker image builds correctly.'
            })

      - name: Comment on PR (Failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Build failed!** Please check the workflow logs for details.'
            })

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Kotlin linter
        run: ./gradlew ktlintCheck || true

      - name: Validate Helm charts
        run: |
          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          # Lint all value files
          helm lint ./helm/service-chart
          helm lint ./helm/service-chart -f ./helm/service-chart/values-local.yaml
          helm lint ./helm/service-chart -f ./helm/service-chart/values-dev.yaml
          helm lint ./helm/service-chart -f ./helm/service-chart/values-prod.yaml

      - name: Validate Kubernetes manifests
        run: |
          # Dry run to validate templates
          helm template test ./helm/service-chart -f ./helm/service-chart/values-dev.yaml > /dev/null
          echo "✅ Kubernetes manifests are valid"
