name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev
      - testing

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      hit: ${{ steps.cache.outputs.hit }}
      src_tag: ${{ steps.cache.outputs.src_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing image
        id: cache
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SRC_TAG="src-${{ hashFiles('src/**', 'build.gradle.kts') }}"
          echo "src_tag=${SRC_TAG}" >> $GITHUB_OUTPUT
          if docker manifest inspect "${IMAGE}:${SRC_TAG}" > /dev/null 2>&1; then
            echo "hit=true" >> $GITHUB_OUTPUT
            echo "Image ${IMAGE}:${SRC_TAG} exists — skipping build"
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.cache.outputs.hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        if: steps.cache.outputs.hit != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build, test, and verify coverage
        if: steps.cache.outputs.hit != 'true'
        run: ./gradlew build jacocoTestCoverageVerification --warning-mode=none --build-cache

      - name: Upload JaCoCo report
        if: steps.cache.outputs.hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

  helm:

    name: Helm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and validate
        run: |
          helm lint ./helm/stack
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/local.yaml
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/dev.yaml
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/prod.yaml
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/local.yaml > /dev/null
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/dev.yaml > /dev/null
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/prod.yaml > /dev/null

  push:
    name: Push Image
    needs: [build, helm]
    if: needs.build.outputs.hit != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          ./gradlew bootBuildImage \
            --imageName="${IMAGE}:${{ needs.build.outputs.src_tag }}" \
            -x test --build-cache
          docker push "${IMAGE}:${{ needs.build.outputs.src_tag }}"
