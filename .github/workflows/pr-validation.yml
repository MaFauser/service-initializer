name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev
      - testing

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            build
            .gradle/configuration-cache
          key: gradle-build-${{ hashFiles('src/**', 'build.gradle.kts') }}
          restore-keys: gradle-build-

      - name: Build, test, and verify coverage
        run: ./gradlew build jacocoTestCoverageVerification --warning-mode=none --build-cache

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.pull_request.head.sha }} \
            -x test --build-cache
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.pull_request.head.sha }}

  lint:
    name: Lint (ktlint + Helm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run ktlint
        run: ./gradlew ktlintCheck --warning-mode=none

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Lint and validate Helm chart
        run: |
          helm lint ./helm/stack
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/local.yaml
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/dev.yaml
          helm lint ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/prod.yaml
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/local.yaml > /dev/null
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/dev.yaml > /dev/null
          helm template test ./helm/stack -f ./helm/stack/config/images.yaml -f ./helm/stack/prod.yaml > /dev/null
