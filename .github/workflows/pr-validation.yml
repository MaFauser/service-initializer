name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev
      - testing

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run check (ktlint + test + build)
        run: ./gradlew build --warning-mode=none

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Build Docker image (validation only)
        run: |
          ./gradlew bootBuildImage \
            --imageName=service:pr-${{ github.event.pull_request.number }}

      - name: Comment on PR (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build successful!** All checks passed (ktlint, tests, JaCoCo report uploaded). Docker image builds correctly.'
            })

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Build failed!** Check the workflow logs (e.g. ktlint, tests, or Docker build).'
            })

  coverage:
    name: Coverage (≥90%)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify coverage ≥90%
        run: ./gradlew jacocoTestCoverageVerification --warning-mode=none

  lint:
    name: Lint (ktlint + Helm)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Run ktlint
        run: ./gradlew ktlintCheck --warning-mode=none

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Lint Helm chart
        run: |
          helm lint ./helm/stack
          helm lint ./helm/stack -f ./helm/stack/values-dev.yaml
          helm lint ./helm/stack -f ./helm/stack/values-prod.yaml

      - name: Validate Kubernetes manifests
        run: |
          helm template test ./helm/stack -f ./helm/stack/values-dev.yaml > /dev/null
          helm template test ./helm/stack -f ./helm/stack/values-prod.yaml > /dev/null
          echo "✅ Kubernetes manifests are valid"
