name: Release to Production

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_VERSION: "v3.14.2"

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (lowercase for OCI spec)
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit SHA
        id: commit
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Commit SHA: $COMMIT_SHA"

      - name: Pull dev image (from merged commit)
        run: |
          # Try to pull the image built from this commit when it was on dev
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.commit.outputs.sha }} || \
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest

      - name: Retag image for production
        run: |
          # Retag the dev image as the version and latest
          SOURCE_TAG=dev-${{ steps.commit.outputs.sha }}

          # If exact sha image doesn't exist, use dev-latest
          if ! docker image inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SOURCE_TAG >/dev/null 2>&1; then
            SOURCE_TAG=dev-latest
          fi

          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SOURCE_TAG \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SOURCE_TAG \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Push production tags
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Production Cluster
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PROD }}
          kubeconfig-encoding: base64

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Ensure namespace exists
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      # Image pull secret and prod Postgres/Grafana credentials must already exist
      # in the cluster (e.g. from External Secrets / key manager). The workflow does not inject passwords.

      - name: Deploy with Helm
        run: |
          for i in 1 2 3; do
            echo "Helm deploy attempt $i/3..."
            if helm upgrade --install prod ./helm/stack \
              -f ./helm/stack/config/images.yaml \
              -f ./helm/stack/prod.yaml \
              --set application.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
              --set application.image.tag=${{ steps.version.outputs.version }} \
              --namespace production \
              --create-namespace \
              --timeout 10m \
              --wait; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Deploy failed, retrying in 60s (often due to API rate limiting)..."
              sleep 60
            fi
          done
          exit 1

      - name: Deployment Summary
        run: |
          echo "## 🚀 Promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Promoted from:** \`dev-${{ steps.commit.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ steps.commit.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Same artifact tested in dev is now in production**" >> $GITHUB_STEP_SUMMARY
