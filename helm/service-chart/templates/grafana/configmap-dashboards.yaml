{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-chart.fullname" . }}-grafana-dashboards
  labels:
    {{- include "service-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  spring-boot.json: |
{{ .Files.Get "dashboards/spring-boot.json" | nindent 4 }}
{{- end }}
