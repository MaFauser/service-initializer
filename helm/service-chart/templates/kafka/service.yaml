{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-chart.fullname" . }}-kafka
  labels:
    {{- include "service-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  type: {{ .Values.kafka.service.type }}
  ports:
  - port: {{ .Values.kafka.service.port }}
    targetPort: kafka
    protocol: TCP
    name: kafka
  - port: 29092
    targetPort: kafka-internal
    protocol: TCP
    name: kafka-internal
  - port: 29093
    targetPort: controller
    protocol: TCP
    name: controller
  selector:
    {{- include "service-chart.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
{{- end }}
