{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-chart.fullname" . }}-prometheus-config
  labels:
    {{- include "service-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'service-app'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['{{ include "service-chart.fullname" . }}-app:8081']
{{- end }}
