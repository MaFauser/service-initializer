# Local development environment values
# Optimized for running on local machine (Docker Desktop, Minikube, kind)
# Minimal resources, fast startup, optional observability

# Minimal resource limits for local development
postgresql:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  persistence:
    enabled: true
    size: 2Gi

redis:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  persistence:
    enabled: true
    size: 1Gi

kafka:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 5Gi

kafkaUi:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Observability stack - minimal for local
# You can disable these to save resources
grafana:
  enabled: true  # Set to false if you don't need dashboards locally
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  persistence:
    enabled: false  # Use emptyDir for faster cleanup

tempo:
  enabled: true  # Set to false if you don't need tracing locally
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  persistence:
    enabled: false  # Use emptyDir for faster cleanup

prometheus:
  enabled: true  # Set to false if you don't need metrics locally
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  persistence:
    enabled: false  # Use emptyDir for faster cleanup

# Application (your Spring Boot service)
application:
  enabled: false  # Run your app outside K8s with `./gradlew bootRun`
