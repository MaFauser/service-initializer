# Chart defaults: structure, ports, services, persistence, resources.
# Always combine with: -f config/images.yaml -f <env>.yaml (local.yaml | dev.yaml | prod.yaml)

global:
  storageClass: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app.example.com
      path: /
      pathType: Prefix
  tls: []

networkPolicy:
  enabled: false

postgresql:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  auth:
    database: ""
    username: ""
    password: ""
    existingSecret: ""
    usernameKey: ""
    passwordKey: ""
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  backup:
    enabled: false
    schedule: "0 2 * * *"
    pvc:
      size: 10Gi

redis:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

kafka:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  config:
    nodeId: 1
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    replicationFactor: 1
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

kafkaUi:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  auth:
    adminUser: ""
    adminPassword: ""
    existingSecret: ""
    adminUserKey: ""
    adminPasswordKey: ""
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

tempo:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      http: 3200
      otlpGrpc: 4317
      otlpHttp: 4318
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

opensearch:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  persistence:
    enabled: true
    size: 10Gi
  disableSecurity: true
  adminPassword: "Opensearch123!"
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

opensearchDashboards:
  enabled: true
  indexPattern: "kubernetes-logs-*"
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5601
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

fluentBit:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

prometheus:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  scrapeInterval: 15s
  evaluationInterval: 15s
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

application:
  enabled: false
  otelServiceName: service
  image:
    repository: your-registry/service
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  replicas: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
