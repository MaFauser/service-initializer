# Base values for stack (structure only).
# Always use with an env file: -f values-local.yaml | -f values-dev.yaml | -f values-prod.yaml
# - local: raw usernames/passwords in values-local.yaml
# - dev/prod: Secrets only (existingSecret); create Secrets before install. No credential defaults in templates.

global:
  storageClass: "" # Use default storage class

# Ingress: expose app via HTTPS (production). Requires an Ingress controller (e.g. NGINX, Traefik).
ingress:
  enabled: false
  className: ""  # e.g. nginx, traefik
  annotations: {}
  # cert-manager for TLS: add annotation and use tls.secretName with a ClusterIssuer
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.example.com
      path: /
      pathType: Prefix
  tls: []
  # - secretName: app-tls
  #   hosts:
  #     - app.example.com

# Network policies: restrict pod-to-pod traffic (app → postgres/redis/kafka/tempo only)
networkPolicy:
  enabled: false

# PostgreSQL Configuration (image, auth from config/shared.yaml)
postgresql:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  # Production: set auth.existingSecret in values-prod to use a K8s Secret (see DEPLOYMENT.md)
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  # Optional: scheduled pg_dump backups to a PVC (sync to object storage separately)
  backup:
    enabled: false
    schedule: "0 2 * * *"  # Daily at 2 AM
    pvc:
      size: 10Gi
    # When using existingSecret for postgresql.auth, backup uses same credentials
    # Or set backup.existingSecret for a dedicated backup Secret (usernameKey, passwordKey)

# Redis Configuration (image from config/shared.yaml)
redis:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Kafka Configuration (image, config from config/shared.yaml)
kafka:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  config:
    nodeId: 1
    # clusterId, replicationFactor from config/shared.yaml
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# Kafka UI Configuration (image from config/shared.yaml)
kafkaUi:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Grafana Configuration (image, auth from config/shared.yaml)
grafana:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Tempo Configuration (image from config/shared.yaml)
tempo:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      http: 3200
      otlpGrpc: 4317
      otlpHttp: 4318
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# OpenSearch Configuration (log aggregation)
opensearch:
  enabled: true
  image:
    repository: docker.io/opensearchproject/opensearch
    tag: "2.18.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  persistence:
    enabled: true
    size: 10Gi
  # disableSecurity: true = HTTP, no auth (dev only). false = HTTPS + admin auth
  disableSecurity: true
  adminPassword: "Opensearch123!"  # Used when disableSecurity=false
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# OpenSearch Dashboards (logs UI)
opensearchDashboards:
  enabled: true
  # Index pattern for Fluent Bit logs (provisioned automatically)
  indexPattern: "kubernetes-logs-*"
  image:
    repository: docker.io/opensearchproject/opensearch-dashboards
    tag: "2.18.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5601
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Fluent Bit (ships pod logs to OpenSearch)
fluentBit:
  enabled: true
  image:
    repository: docker.io/fluent/fluent-bit
    tag: "3.2.2"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Prometheus Configuration (image, intervals from config/shared.yaml)
prometheus:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Spring Boot Application Configuration
application:
  enabled: false # Deploy your app separately or set to true
  otelServiceName: service # Used for resource.service.name in traces (TraceQL)
  # For production: create a Secret with DB credentials and set datasource.existingSecret
  datasource:
    # existingSecret: ""  # e.g. prod-app-datasource (keys: username, password)
    # usernameKey: username
    # passwordKey: password
  # imagePullSecrets: []  # e.g. [ { name: ghcr-registry } ] when pulling from private ghcr.io
  image:
    repository: your-registry/service
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  replicas: 1
  # Horizontal Pod Autoscaler (production)
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
