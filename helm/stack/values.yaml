# Default values for stack
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  storageClass: "" # Use default storage class

# PostgreSQL Configuration
postgresql:
  enabled: true
  image:
    repository: docker.io/library/postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    database: servicedb
    username: service
    password: service123
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# Redis Configuration
redis:
  enabled: true
  image:
    repository: docker.io/library/redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Kafka Configuration
kafka:
  enabled: true
  image:
    repository: docker.io/confluentinc/cp-kafka
    tag: "7.6.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  config:
    nodeId: 1
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
    replicationFactor: 1

# Kafka UI Configuration
kafkaUi:
  enabled: true
  image:
    repository: docker.io/provectuslabs/kafka-ui
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Grafana Configuration
grafana:
  enabled: true
  image:
    repository: docker.io/grafana/grafana
    tag: "12.3.3"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  persistence:
    enabled: true
    size: 5Gi
  auth:
    adminUser: admin
    adminPassword: admin
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Tempo Configuration (2.3.0: minimal setup, classic ingester path)
tempo:
  enabled: true
  image:
    repository: docker.io/grafana/tempo
    tag: "2.3.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      http: 3200
      otlpGrpc: 4317
      otlpHttp: 4318
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# OpenSearch Configuration (log aggregation)
opensearch:
  enabled: true
  image:
    repository: docker.io/opensearchproject/opensearch
    tag: "2.18.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  persistence:
    enabled: true
    size: 10Gi
  # disableSecurity: true = HTTP, no auth (dev only). false = HTTPS + admin auth
  disableSecurity: true
  adminPassword: "Opensearch123!"  # Used when disableSecurity=false
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

# OpenSearch Dashboards (logs UI)
opensearchDashboards:
  enabled: true
  # Index pattern for Fluent Bit logs (provisioned automatically)
  indexPattern: "kubernetes-logs-*"
  image:
    repository: docker.io/opensearchproject/opensearch-dashboards
    tag: "2.18.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5601
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Fluent Bit (ships pod logs to OpenSearch)
fluentBit:
  enabled: true
  image:
    repository: docker.io/fluent/fluent-bit
    tag: "3.2.2"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Prometheus Configuration
prometheus:
  enabled: true
  image:
    repository: docker.io/prom/prometheus
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  scrapeInterval: 15s
  evaluationInterval: 15s

# Spring Boot Application Configuration
application:
  enabled: false # Deploy your app separately or set to true
  otelServiceName: service # Used for resource.service.name in traces (TraceQL)
  # imagePullSecrets: []  # e.g. [ { name: ghcr-registry } ] when pulling from private ghcr.io
  image:
    repository: your-registry/service
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  replicas: 1
