# Development environment values
# For shared development Kubernetes cluster (staging/QA environment)

# PostgreSQL
postgresql:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    size: 5Gi

# Redis
redis:
  enabled: true
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  persistence:
    size: 2Gi

# Kafka
kafka:
  enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  persistence:
    size: 10Gi

# Kafka UI
kafkaUi:
  enabled: true

# Grafana
grafana:
  enabled: true
  persistence:
    size: 2Gi

# Tempo
tempo:
  enabled: true
  persistence:
    size: 5Gi

# Prometheus
prometheus:
  enabled: true
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Application settings for dev environment
application:
  enabled: true  # Deploy app to dev cluster
  # imagePullSecrets: [{ name: ghcr-registry }]  # Required if ghcr.io package is private; create with: kubectl create secret docker-registry ghcr-registry --docker-server=ghcr.io --docker-username=USER --docker-password=TOKEN -n development
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
