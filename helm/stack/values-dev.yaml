# Development environment: uses Secrets for credentials (no raw passwords).
# Create Secret before install: kubectl create secret generic dev-postgresql-credentials --from-literal=username=service --from-literal=password=<secret> -n development
# Use with: helm install dev ./helm/stack -f helm/stack/config/shared.yaml -f helm/stack/values.yaml -f helm/stack/values-dev.yaml -n development --create-namespace

postgresql:
  enabled: true
  auth:
    database: servicedb
    existingSecret: dev-postgresql-credentials
    usernameKey: username
    passwordKey: password
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  backup:
    enabled: false

redis:
  enabled: true
  persistence:
    size: 2Gi
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

kafka:
  enabled: true
  persistence:
    size: 10Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

kafkaUi:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  enabled: true
  auth:
    existingSecret: dev-grafana-credentials
    adminUserKey: adminUser
    adminPasswordKey: adminPassword
  persistence:
    size: 2Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

tempo:
  enabled: true
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

opensearch:
  enabled: true
  disableSecurity: true
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"

opensearchDashboards:
  enabled: true
  indexPattern: "kubernetes-logs-*"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

fluentBit:
  enabled: true

prometheus:
  enabled: true
  persistence:
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

application:
  enabled: true
  otelServiceName: service
  imagePullSecrets:
    - name: ghcr-registry
  image:
    pullPolicy: Always  # so dev-latest is always re-pulled after you push a new build
  replicas: 1
  datasource:
    existingSecret: dev-postgresql-credentials
    usernameKey: username
    passwordKey: password
  service:
    port: 8081
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: false

ingress:
  enabled: false

networkPolicy:
  enabled: false
