{{- if .Values.application.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stack.fullname" . }}-app
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.application.service.type }}
  ports:
  - port: {{ .Values.application.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
{{- end }}
