{{- if .Values.application.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stack.fullname" . }}-app
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.application.replicas }}
  selector:
    matchLabels:
      {{- include "stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.application.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-postgres
        image: docker.io/library/busybox:1.36
        command: ['sh', '-c', 'until nc -z {{ include "stack.fullname" . }}-postgresql 5432; do echo "waiting for postgres..."; sleep 2; done']
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      containers:
      - name: app
        image: "{{ .Values.application.image.repository }}:{{ .Values.application.image.tag }}"
        imagePullPolicy: {{ .Values.application.image.pullPolicy }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: {{ .Values.application.service.port }}
          protocol: TCP
        - name: management
          containerPort: 8082
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: k8s
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://{{ include "stack.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}
        {{- if and .Values.application.datasource .Values.application.datasource.existingSecret }}
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.application.datasource.existingSecret }}
              key: {{ .Values.application.datasource.usernameKey }}
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.application.datasource.existingSecret }}
              key: {{ .Values.application.datasource.passwordKey }}
        {{- else }}
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.postgresql.auth.username }}
        - name: SPRING_DATASOURCE_PASSWORD
          value: {{ .Values.postgresql.auth.password }}
        {{- end }}
        - name: SPRING_DATA_REDIS_HOST
          value: {{ include "stack.fullname" . }}-redis
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: {{ include "stack.fullname" . }}-kafka:9092
        - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
          value: http://{{ include "stack.fullname" . }}-tempo:4318/v1/traces
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.application.otelServiceName | quote }}
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: management
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: management
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: management
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.application.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
