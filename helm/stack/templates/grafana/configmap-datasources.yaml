{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-grafana-datasources
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "stack.fullname" . }}-prometheus:9090
        isDefault: true
        editable: true
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://{{ include "stack.fullname" . }}-tempo:3200
        editable: true
        jsonData:
          httpMethod: GET
{{- end }}
