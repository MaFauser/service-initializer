{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-grafana-datasources
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "stack.fullname" . }}-prometheus:9090
        isDefault: true
        editable: true
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://{{ include "stack.fullname" . }}-tempo:3200
        editable: true
        jsonData:
          httpMethod: GET
          {{- if and .Values.opensearch.enabled .Values.fluentBit.enabled }}
          tracesToLogsV2:
            datasourceUid: opensearch
            spanStartTimeShift: -5m
            spanEndTimeShift: 5m
            filterByTraceID: true
            customQuery: true
            query: 'traceId:"$${__span.traceId}"'
          {{- end }}
      {{- if and .Values.opensearch.enabled .Values.fluentBit.enabled }}
      - name: OpenSearch
        uid: opensearch
        type: elasticsearch
        access: proxy
        url: http://{{ include "stack.fullname" . }}-opensearch:9200
        database: "{{ .Values.opensearchDashboards.indexPattern }}"
        editable: true
        jsonData:
          timeField: "@timestamp"
          logMessageField: message
          logLevelField: level
          traceIdField: traceId
          dataLinks:
            - title: View trace in Tempo
              url: ""
              internal:
                datasourceUid: tempo
                datasourceName: Tempo
                query: "$${__value.raw}"
      {{- end }}
{{- end }}
