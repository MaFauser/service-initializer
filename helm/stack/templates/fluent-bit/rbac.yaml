{{- if and .Values.opensearch.enabled .Values.fluentBit.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "stack.fullname" . }}-fluent-bit
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluent-bit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "stack.fullname" . }}-fluent-bit
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "stack.fullname" . }}-fluent-bit
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "stack.fullname" . }}-fluent-bit
subjects:
  - kind: ServiceAccount
    name: {{ include "stack.fullname" . }}-fluent-bit
    namespace: {{ .Release.Namespace }}
{{- end }}
