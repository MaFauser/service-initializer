{{- if and .Values.opensearch.enabled .Values.fluentBit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-fluent-bit-config
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 5
        Log_Level info
        Daemon off
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

    [INPUT]
        Name tail
        Tag kube.*
        Path /var/log/containers/*.log
        Parser cri
        DB /var/lib/fluent-bit/flb_kube.db
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        Refresh_Interval 10

    [FILTER]
        Name kubernetes
        Match kube.*
        Kube_URL https://kubernetes.default.svc:443
        Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Merge_Log_Key log_processed
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off

    [FILTER]
        Name parser
        Match kube.*
        Key_Name log_processed
        Parser logstash_json
        Reserve_Data On

    [FILTER]
        Name nest
        Match kube.*
        Operation lift
        Nested_under log_processed

    [OUTPUT]
        Name opensearch
        Match *
        Host {{ include "stack.fullname" . }}-opensearch
        Port 9200
        {{- if not .Values.opensearch.disableSecurity }}
        HTTP_User admin
        HTTP_Passwd {{ .Values.opensearch.adminPassword | quote }}
        TLS On
        TLS_Verify Off
        {{- end }}
        Logstash_Format On
        Logstash_Prefix kubernetes-logs
        Replace_Dots On
        Retry_Limit False
        Suppress_Type_Name On
        Generate_ID On

  parsers.conf: |
    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name logstash_json
        Format json
        Time_Key @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep On
{{- end }}
