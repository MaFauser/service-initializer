{{- if and .Values.opensearch.enabled .Values.fluentBit.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "stack.fullname" . }}-fluent-bit
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluent-bit
spec:
  selector:
    matchLabels:
      {{- include "stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fluent-bit
  template:
    metadata:
      labels:
        {{- include "stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fluent-bit
    spec:
      serviceAccountName: {{ include "stack.fullname" . }}-fluent-bit
      containers:
      - name: fluent-bit
        image: "{{ .Values.fluentBit.image.repository }}:{{ .Values.fluentBit.image.tag }}"
        imagePullPolicy: {{ .Values.fluentBit.image.pullPolicy }}
        args:
        - -c
        - /fluent-bit/etc/fluent-bit.conf
        ports:
        - name: http
          containerPort: 2020
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          {{- toYaml .Values.fluentBit.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: state
          mountPath: /var/lib/fluent-bit
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      volumes:
      - name: config
        configMap:
          name: {{ include "stack.fullname" . }}-fluent-bit-config
      - name: varlog
        hostPath:
          path: /var/log
          type: Directory
      - name: state
        emptyDir: {}
{{- end }}
