{{- if .Values.tempo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stack.fullname" . }}-tempo-config
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yaml: |
{{ .Files.Get "config/tempo.yaml" | nindent 4 }}
{{- end }}
