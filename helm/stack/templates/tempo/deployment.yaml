{{- if .Values.tempo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stack.fullname" . }}-tempo
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        {{- include "stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tempo
    spec:
      containers:
      - name: tempo
        image: "{{ .Values.tempo.image.repository }}:{{ .Values.tempo.image.tag }}"
        imagePullPolicy: {{ .Values.tempo.image.pullPolicy }}
        args:
        - "-config.file=/etc/tempo.yaml"
        ports:
        - name: http
          containerPort: 3200
          protocol: TCP
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          {{- toYaml .Values.tempo.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /etc/tempo.yaml
          subPath: tempo.yaml
          readOnly: true
        - name: data
          mountPath: /tmp/tempo
      volumes:
      - name: config
        configMap:
          name: {{ include "stack.fullname" . }}-tempo-config
      - name: data
        {{- if .Values.tempo.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "stack.fullname" . }}-tempo
        {{- else }}
        emptyDir: {}
        {{- end }}
{{- end }}
