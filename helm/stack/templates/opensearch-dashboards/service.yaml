{{- if and .Values.opensearch.enabled .Values.opensearchDashboards.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stack.fullname" . }}-opensearch-dashboards
  labels:
    {{- include "stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
spec:
  type: {{ .Values.opensearchDashboards.service.type }}
  ports:
  - port: {{ .Values.opensearchDashboards.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch-dashboards
{{- end }}
