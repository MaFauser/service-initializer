# Test overrides: placeholders for properties that Testcontainers overrides via @ServiceConnection
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://mock-issuer.test

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    "[com.mafauser.service]": debug

management:
  tracing:
    export:
      enabled: false
      otlp:
        enabled: false

rate-limit:
  enabled: false
